[project]
site_name = "MoonAI"
site_description = "A new project generated from the default template project."
site_author = "Emir Irkılata, Caner Aras, Oğuzhan Özkaya"
site_url = "https://moon-aii.github.io/moonai/"

repo_name = "moon-aii/moonai"
repo_url = "https://github.com/moon-aii/moonai"

copyright = "CMPE 491/492 - Senior Design Project | TED University"

extra_css = ["_assets/extra.css"]
#extra_javascript = ["javascripts/extra.js"]

nav = [
  { "Home" = "index.md" },
  { "Internals" = [
    "internals/domain.md",
    "internals/structure.md",
    "internals/architecture.md",
    "internals/standarts.md",
    "internals/workflow.md",
    "internals/roadmap.md"
  ]}
]

[project.theme]
language = "en"

favicon = "_assets/logo.svg"
logo = "_assets/logo.svg"

#custom_dir = "overrides"

features = [
    "announce.dismiss",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",

    # Turn on this feature to expand all collapsible sections in the
    # navigation sidebar by default.
    # https://zensical.org/docs/setup/navigation/#navigation-expansion
    "navigation.expand",

    # This feature turns on navigation elements in the footer that allow the
    # user to navigate to a next or previous page.
    # https://zensical.org/docs/setup/footer/#navigation
    # "navigation.footer",

    # When section index pages are enabled, documents can be directly attached
    # to sections, which is particularly useful for providing overview pages.
    # https://zensical.org/docs/setup/navigation/#section-index-pages
    # "navigation.indexes",

    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.instant.progress",

    "navigation.prune",

    # When sections are enabled, top-level sections are rendered as groups in
    # the sidebar for viewports above 1220px, but remain as-is on mobile.
    # https://zensical.org/docs/setup/navigation/#navigation-sections
    # "navigation.sections",

    "navigation.tabs",
    # "navigation.tabs.sticky",
    "navigation.top",

    "navigation.tracking",

    "search.highlight",
    "toc.follow",

    "toc.integrate",
]

[project.extra]
generator = false

[project.theme.icon]
repo = "fontawesome/brands/github"

[project.theme.font]
text = "IBM Plex Sans"
code = "Source Code Pro"

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

# [project.markdown_extensions]
# markdown_extensions.toc.permalink = ""
# title = "Table of Contents"
