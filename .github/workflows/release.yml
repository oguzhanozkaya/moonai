name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  # ── Build Release Binaries ────────────────────────────────────────────
  build:
    name: Build ${{ matrix.os_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            os_name: linux-x64
            artifact_path: build/moonai
            archive_name: moonai-linux-x64
          - os: windows-latest
            os_name: windows-x64
            artifact_path: build/Release/moonai.exe
            archive_name: moonai-windows-x64

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libx11-dev libxrandr-dev \
            libxcursor-dev libxi-dev libudev-dev libgl1-mesa-dev \
            libflac-dev libogg-dev libvorbis-dev libfreetype6-dev

      - name: Set up vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "b42b19a62b63514ed9fa2a81e07ce75e613c83c0"

      - name: Export GitHub Actions cache variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake \
            -DMOONAI_BUILD_TESTS=OFF

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DMOONAI_BUILD_TESTS=OFF

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: cmake --build build --parallel

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cmake --build build --config Release --parallel

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p package/moonai
          cp build/moonai package/moonai/
          cp -r config package/moonai/
          cp README.md package/moonai/
          cd package && tar -czf ../moonai-linux-x64.tar.gz moonai/

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force -Path package/moonai
          Copy-Item build/Release/moonai.exe package/moonai/
          Copy-Item -Recurse config package/moonai/
          Copy-Item README.md package/moonai/
          Compress-Archive -Path package/moonai -DestinationPath moonai-windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}
          path: |
            moonai-*.tar.gz
            moonai-*.zip
          retention-days: 1

  # ── Create GitHub Release ──────────────────────────────────────────────
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/moonai-linux-x64/moonai-linux-x64.tar.gz
            artifacts/moonai-windows-x64/moonai-windows-x64.zip
